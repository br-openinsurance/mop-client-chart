# ============================================================
# 🌍 GLOBAL
# ============================================================
global:
  imageRegistry: ghcr.io/br-openinsurance-infra

  imagePullSecrets:
    - name: ghcr-secret

  # URL do MOP Server (todos os componentes usam)
  mopServerUrl: "https://mop-server.example.com"

  # Namespace global (não usamos, pois cada app tem o seu)
  namespaceOverride: ""


# ============================================================
# 🚀 mop-client-anonymization
# ============================================================
mopClientAnonymization:
  enabled: true
  namespace: "anonymization-client"

  replicaCount: 1

  image:
    repository: opin-mop-client-anonymization/open-insurance-mop-anonymization
    tag: "develop"
    pullPolicy: IfNotPresent

  service:
    port: 8081
    type: ClusterIP

  env: {}
  # env:
  #   LOG_LEVEL: INFO

  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80


# ============================================================
# 🚀 mop-client-request-dispatcher
# ============================================================
mopClientRequestDispatcher:
  enabled: false
  namespace: "mop-client-request-dispatcher"

  replicaCount: 1

  image:
    repository: mop-client-request-dispatcher
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  service:
    port: 8080
    type: ClusterIP

  env: {}

  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80


