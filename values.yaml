# ============================================================
# 🚀 mop-gateway
# ============================================================
mopGateway:
  enabled: true
  namespace: "gateway-client"

  replicaCount: 1

  image:
    repository: opin-mop-gateway/open-insurance-mop-gateway
    tag: "develop"
    pullPolicy: IfNotPresent

  service:
    port: 8080
    type: ClusterIP

  ingress:
    enabled: true
    className: ""
    annotations: {}
    hosts:
      - host: mop-client-gateway-dev-client.intranet.opinbrasil
        paths:
          - path: /
            pathType: Prefix
    # exemplo:
    # hosts:
    #   - host: mop-gateway.example.com
    #     path: /

    tls: []
    # exemplo:
    # tls:
    #   - secretName: mop-gateway-tls
    #     hosts:
    #       - mop-gateway.example.com

  env: {}

  resources:
    limits:
      cpu: "750m"
      memory: "1Gi"
    requests:
      cpu: "300m"
      memory: "512Mi"

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80


