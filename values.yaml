# ============================================================
# 🌍 GLOBAL
# ============================================================
global:
  imageRegistry: ghcr.io/br-openinsurance

  imagePullSecrets:
    - name: ghcr-secret

  registryCredentials:
    enabled: false
    secretName: ghcr-secret
    server: ghcr.io
    username: ""      # o cliente informa no values-client.yaml
    password: ""      # o cliente informa no values-client.yaml (PAT com read:packages)
    email: ""         # opcional

  # URL do MOP Server (todos os componentes usam)
  mopServerUrl: "https://mop-server.example.com"

  # Namespace global (não usamos, pois cada app tem o seu)
  namespaceOverride: ""

# ============================================================
# 🚀 mop-gateway
# ============================================================
mopGateway:
  enabled: true
  namespace: "gateway-client"

  replicaCount: 1

  image:
    repository: openinsurance-mop-gateway-pub
    tag: "develop"
    pullPolicy: IfNotPresent

  service:
    port: 8080
    type: ClusterIP

  ingress:
    enabled: true
    className: "nginx"
    annotations: {}
    hosts:
      - host: mop-client-gateway-dev-client.intranet.opinbrasil
        paths:
          - path: /
            pathType: Prefix
    # exemplo:
    # hosts:
    #   - host: mop-gateway.example.com
    #     path: /

    tls: []
    # exemplo:
    # tls:
    #   - secretName: mop-gateway-tls
    #     hosts:
    #       - mop-gateway.example.com

  env: {}

  resources:
    limits:
      cpu: "750m"
      memory: "1Gi"
    requests:
      cpu: "300m"
      memory: "512Mi"

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

# ============================================================
# 🚀 broker-client
# ============================================================
brokerClient:
  enabled: true
  namespace: "broker-client-client"

  replicaCount: 2

  auth:
    username: user
    securePassword: true

  image:
    registry: ghcr.io
    repository: br-openinsurance-infra/rabbitmq
    tag: "3.12.0-debian-11-r0"
    pullPolicy: IfNotPresent

  extraPlugins: "rabbitmq_management rabbitmq_peer_discovery_k8s rabbitmq_auth_backend_ldap"

  persistence:
    enabled: true
    size: 8Gi
    accessModes:
      - ReadWriteOnce

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - rabbitmq
          topologyKey: kubernetes.io/hostname

  service:
    type: ClusterIP
    ports:
      amqp: 5672

  management:
    enabled: true
    service:
      type: ClusterIP
      ports:
        http: 15672

  imagePullSecrets: []
