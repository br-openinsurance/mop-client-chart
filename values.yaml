# ============================================================
# 🌍 GLOBAL
# ============================================================
global:
  imageRegistry: ghcr.io/br-openinsurance-infra

  imagePullSecrets:
    - name: ghcr-secret

  # URL do MOP Server (todos os componentes usam)
  mopServerUrl: "https://mop-server.example.com"

  # Namespace global (não usamos, pois cada app tem o seu)
  namespaceOverride: ""


# ============================================================
# 🚀 mop-client-anonymization
# ============================================================
mopClientAnonymization:
  enabled: true
  namespace: "anonymization-client"

  replicaCount: 1

  image:
    repository: opin-mop-client-anonymization/open-insurance-mop-anonymization
    tag: "develop"
    pullPolicy: IfNotPresent

  service:
    port: 8081
    type: ClusterIP

  env: {}
  # env:
  #   LOG_LEVEL: INFO

  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80


# ============================================================
# 🚀 mop-client-request-dispatcher
# ============================================================
mopClientRequestDispatcher:
  enabled: false
  namespace: "mop-client-request-dispatcher"

  replicaCount: 1

  image:
    repository: mop-client-request-dispatcher
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  service:
    port: 8080
    type: ClusterIP

  env: {}

  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80


# ============================================================
# 🚀 mop-data-anonymization
# ============================================================
mopDataAnonymization:
  enabled: false
  namespace: "mop-data-anonymization"

  replicaCount: 1

  image:
    repository: mop-data-anonymization
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  service:
    port: 8080
    type: ClusterIP

  env: {}

  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80


# ============================================================
# 🚀 mop-gateway
# ============================================================
mopGateway:
  enabled: true
  namespace: "gateway-client"

  replicaCount: 1

  image:
    repository: opin-mop-gateway/open-insurance-mop-gateway
    tag: "develop"
    pullPolicy: IfNotPresent

  service:
    port: 8080
    type: ClusterIP

  ingress:
    enabled: true
    className: ""
    annotations: {}
    hosts:
      - host: mop-client-gateway-dev-client.intranet.opinbrasil
        paths:
          - path: /
            pathType: Prefix
    # exemplo:
    # hosts:
    #   - host: mop-gateway.example.com
    #     path: /

    tls: []
    # exemplo:
    # tls:
    #   - secretName: mop-gateway-tls
    #     hosts:
    #       - mop-gateway.example.com

  env: {}

  resources:
    limits:
      cpu: "750m"
      memory: "1Gi"
    requests:
      cpu: "300m"
      memory: "512Mi"

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80


# ============================================================
# 🚀 mop-validator
# ============================================================
mopValidator:
  enabled: true
  namespace: "validator-client"

  replicaCount: 1

  image:
    repository: mop-client-data-validator/open-insurance-mop-validator
    tag: "develop"
    pullPolicy: IfNotPresent

  service:
    port: 8084
    type: ClusterIP

  env: {}

  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "200m"
      memory: "256Mi"

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80


# ============================================================
# 🚀 broker-client
# ============================================================
brokerClient:
  enabled: true
  namespace: "broker-client-client"

  replicaCount: 2

  auth:
    username: user
    securePassword: true

  image:
    registry: ghcr.io
    repository: br-openinsurance-infra/rabbitmq
    tag: "3.12.0-debian-11-r0"
    pullPolicy: IfNotPresent

  extraPlugins: "rabbitmq_management rabbitmq_peer_discovery_k8s rabbitmq_auth_backend_ldap"

  persistence:
    enabled: true
    size: 8Gi
    accessModes:
      - ReadWriteOnce

  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - rabbitmq
          topologyKey: kubernetes.io/hostname

  service:
    type: ClusterIP
    ports:
      amqp: 5672

  management:
    enabled: true
    service:
      type: ClusterIP
      ports:
        http: 15672

  imagePullSecrets: []
