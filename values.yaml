# ============================================================
# 🚀 mop-gateway
# ============================================================
mopGateway:
  enabled: false
  namespace: "mop-gateway"

  replicaCount: 2

  image:
    repository: mop-gateway
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  service:
    port: 8080
    type: ClusterIP

  ingress:
    enabled: false
    className: ""
    hosts: []
    # exemplo:
    # hosts:
    #   - host: mop-gateway.example.com
    #     path: /

    tls: []
    # exemplo:
    # tls:
    #   - secretName: mop-gateway-tls
    #     hosts:
    #       - mop-gateway.example.com

  env: {}

  resources:
    limits:
      cpu: "750m"
      memory: "1Gi"
    requests:
      cpu: "300m"
      memory: "512Mi"

  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 80


