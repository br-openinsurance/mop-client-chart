{{- if and .Values.mopGateway.enabled .Values.mopGateway.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mop-gateway-hpa
  namespace: {{ .Values.mopGateway.namespace }}
  labels:
    app: mop-gateway
    {{- include "mop-client.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mop-gateway
  minReplicas: {{ .Values.mopGateway.hpa.minReplicas }}
  maxReplicas: {{ .Values.mopGateway.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.mopGateway.hpa.targetCPUUtilizationPercentage }}
{{- end }}
