{{- if and .Values.mopValidator.enabled .Values.mopValidator.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mop-validator-hpa
  namespace: {{ .Values.mopValidator.namespace }}
  labels:
    app: mop-validator
    {{- include "mop-client.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mop-validator
  minReplicas: {{ .Values.mopValidator.hpa.minReplicas }}
  maxReplicas: {{ .Values.mopValidator.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.mopValidator.hpa.targetCPUUtilizationPercentage }}
{{- end }}
