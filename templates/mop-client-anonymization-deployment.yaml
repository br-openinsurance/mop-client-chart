{{- if .Values.mopClientAnonymization.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mop-anonymization
  namespace: {{ .Values.mopClientAnonymization.namespace }}
  labels:
    app: mop-anonymization
    {{- include "mop-client.labels" . | nindent 4 }}

spec:
  replicas: {{ .Values.mopClientAnonymization.replicaCount }}

  selector:
    matchLabels:
      app: mop-anonymization

  template:
    metadata:
      labels:
        app: mop-anonymization
        {{- include "mop-client.labels" . | nindent 8 }}

    spec:
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      {{- end }}

      containers:
        - name: mop-anonymization
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.mopClientAnonymization.image.repository }}:{{ .Values.mopClientAnonymization.image.tag }}"
          imagePullPolicy: {{ .Values.mopClientAnonymization.image.pullPolicy }}

          ports:
            - containerPort: {{ .Values.mopClientAnonymization.service.port }}

          env:
            {{- range $key, $value := .Values.mopClientAnonymization.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}
            - name: MOP_SERVER_URL
              value: "{{ .Values.global.mopServerUrl }}"

          resources:
            {{- toYaml .Values.mopClientAnonymization.resources | nindent 12 }}
{{- end }}
